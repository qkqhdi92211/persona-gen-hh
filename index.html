<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>페르소나 랜덤 생성기</title>
  <style>
    :root {
      --bg: #f7f1ea;
      --card: #fffaf4;
      --ink: #332923;
      --sub: #8a7568;
      --line: #e7d8cb;
      --accent: #b66d5f;
      --accent2: #77493f;
      --soft: #f0e2d6;
      --shadow: 0 18px 45px rgba(75, 48, 37, 0.14);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(182, 109, 95, 0.16), transparent 35%),
        radial-gradient(circle at bottom right, rgba(119, 73, 63, 0.13), transparent 35%),
        var(--bg);
      color: var(--ink);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 22px;
    }

    .wrap { width: min(980px, 100%); margin: 0 auto; }

    header { margin: 18px 0; text-align: center; }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: -0.06em;
      line-height: 1.05;
    }

    .desc { margin: 10px 0 0; color: var(--sub); font-size: 14px; }

    .panel {
      background: rgba(255, 250, 244, 0.88);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 18px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .select-row { display: grid; grid-template-columns: 1fr; gap: 10px; }

    label { font-size: 13px; color: var(--sub); font-weight: 800; }

    select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fffdf9;
      color: var(--ink);
      padding: 13px 14px;
      border-radius: 14px;
      font-size: 15px;
      outline: none;
    }

    .buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 10px;
      background: var(--soft);
      color: var(--accent2);
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:active { transform: scale(0.98); }
    button.primary { background: var(--accent); color: white; }
    button.danger { background: #ead2cc; color: #93453e; }

    .result {
      background: #fffdf9;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
    }

    .item {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 10px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
    }

    .item:last-child { border-bottom: 0; }

    .key {
      color: var(--accent2);
      font-weight: 900;
      font-size: 14px;
      white-space: nowrap;
    }

    .value {
      color: var(--ink);
      line-height: 1.45;
      font-size: 15px;
      word-break: keep-all;
    }

    textarea {
      width: 100%;
      min-height: 230px;
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fffdf9;
      color: var(--ink);
      padding: 15px;
      font-size: 14px;
      line-height: 1.55;
      resize: vertical;
      outline: none;
      display: none;
    }

    .saved { margin-top: 16px; }
    .saved-title { font-size: 15px; font-weight: 900; margin: 0 0 10px; color: var(--accent2); }
    .saved-list { display: grid; gap: 9px; }

    .saved-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      background: #fffdf9;
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 11px 12px;
    }

    .saved-card small { color: var(--sub); display: block; margin-top: 3px; line-height: 1.35; }
    .saved-card button { padding: 9px 10px; font-size: 12px; border-radius: 11px; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(51, 41, 35, 0.92);
      color: white;
      padding: 11px 15px;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s ease;
      z-index: 20;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (min-width: 720px) {
      .controls { grid-template-columns: 260px 1fr; align-items: end; }
      .buttons { grid-template-columns: repeat(5, 1fr); }
      .item { grid-template-columns: 120px 1fr; }
    }

    @media (max-width: 420px) {
      body { padding: 14px; }
      .panel { padding: 14px; }
      .buttons { grid-template-columns: 1fr; }
      .item { grid-template-columns: 1fr; gap: 4px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>페르소나 랜덤 생성기</h1>
      <p class="desc">장르를 고르면 국가·이름·직업·외형·배경이 같은 축으로 맞춰져 생성됨</p>
    </header>

    <main class="panel">
      <section class="controls">
        <div class="select-row">
          <label for="genreSelect">장르 선택</label>
          <select id="genreSelect"></select>
        </div>

        <div class="buttons">
          <button class="primary" id="rollAll">랜덤 생성</button>
          <button id="rollName">이름만</button>
          <button id="rollBasic">기본 정보만</button>
          <button id="rollLook">외형만</button>
          <button id="rollPersonality">성격만</button>
          <button id="rollHabit">습관만</button>
          <button id="rollTaste">취향만</button>
          <button id="copyBtn">복사</button>
          <button id="saveBtn">저장</button>
        </div>
      </section>

      <section class="result" id="result"></section>
      <textarea id="plainText" readonly></textarea>

      <section class="saved">
        <p class="saved-title">저장한 페르소나</p>
        <div class="saved-list" id="savedList"></div>
      </section>
    </main>
  </div>

    const state = {

    const fields = [
      ["이름", "name"],
      ["기본 정보", "basic"],

    const $ = (id) => document.getElementById(id);

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function sample(arr, count) {
      const copied = [...arr];
      const out = [];
      while (copied.length && out.length < count) {
        const index = Math.floor(Math.random() * copied.length);
        out.push(copied.splice(index, 1)[0]);
      }
      return out;
    }

    function genreKeysOnly() {
      return Object.keys(GENRES).filter(key => key !== "전체 랜덤");
    }

    function resolveGenre() {
      if (state.selectedGenre === "전체 랜덤") return pick(genreKeysOnly());
      return state.selectedGenre;
    }

    function currentGenreData() {
      return GENRES[state.activeGenre] || GENRES["현대 로맨스"];
    }

    function currentOrigin() {
      return ORIGINS[state.originKey] || ORIGINS.KR;
    }

    function makeName() {
      const origin = currentOrigin();
      const first = pick(origin.first);
      const last = pick(origin.last);
      if (state.originKey === "KR") {
        state.name = `${last}${first}`;
      } else {
        state.name = `${first[0]} ${last[0]} (${first[1]} ${last[1]})`;
      }
    }

    function makeBasic(keepGenre = false) {
      state.activeGenre = keepGenre ? state.activeGenre : resolveGenre();
      const genre = currentGenreData();
      state.originKey = pick(genre.origins);
      state.country = ORIGINS[state.originKey].label;

      const jobData = pick(genre.jobs);
      state.job = jobData[0];
      state.age = `${rand(jobData[1], jobData[2])}세`;
      state.basic = `${state.country} / ${state.age} / ${state.job} / ${state.activeGenre}`;
    }

    function makeLook() {
      const origin = currentOrigin();
      const genre = currentGenreData();
      const lookParts = [
        pick(origin.hair),
        pick(origin.eyes),
        pick(origin.skin),
        pick(genre.style),
        pick(COMMON.vibe)
      ];
      state.look = lookParts.join(" / ");
    }

    function makePersonality() {
      const profile = pick(COMMON.personalityProfiles);
      state.personality = `${profile.desc}
키워드: ${sample(profile.tags, Math.min(4, profile.tags.length)).join(", ")}`;
    }

    function makeHabit() {
      state.habit = pick(currentGenreData().habit);
    }

    function makeTaste() {
      state.taste = sample(currentGenreData().taste, 3).join(" / ");
    }

    function makeBackground() {
      state.background = pick(currentGenreData().background);
    }

    function rollAll() {
      state.selectedGenre = genreSelect.value;
      makeBasic(false);
      makeName();
      makeLook();
      makePersonality();
      makeHabit();
      makeTaste();
      makeBackground();
      render();
    }

    function rerollName() {
      makeName();
      render();
    }

    function rerollBasic() {
      state.selectedGenre = genreSelect.value;
      makeBasic(false);
      makeName();
      makeLook();
      makeHabit();
      makeTaste();
      makeBackground();
      render();
    }

    function rerollLook() {
      makeLook();
      render();
    }

    function rerollPersonality() {
      makePersonality();
      render();
    }

    function rerollHabit() {
      makeHabit();
      render();
    }

    function rerollTaste() {
      makeTaste();
      render();
    }

    function formatText() {
      return fields.map(([label, key]) => `[${label}]\n${state[key]}`).join("\n\n");
    }

    function render() {
      result.innerHTML = fields.map(([label, key]) => `
        <div class="item">
          <div class="key">${label}</div>
          <div class="value">${state[key] || "-"}</div>
        </div>
      `).join("");
      plainText.value = formatText();
      renderSaved();
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1500);
    }

    async function copyResult() {
      const text = formatText();
      try {
        await navigator.clipboard.writeText(text);
        showToast("복사됨");
      } catch {
        plainText.style.display = "block";
        plainText.select();
        document.execCommand("copy");
        showToast("복사됨");
      }
    }

    function getSaved() {
      try { return JSON.parse(localStorage.getItem("personaSavedSimplePersonality") || "[]"); }
      catch { return []; }
    }

    function setSaved(list) {
      localStorage.setItem("personaSavedSimplePersonality", JSON.stringify(list));
    }

    function saveCurrent() {
      const list = getSaved();
      list.unshift({ id: Date.now(), name: state.name, basic: state.basic, text: formatText() });
      setSaved(list.slice(0, 30));
      renderSaved();
      showToast("저장됨");
    }

    function deleteSaved(id) {
      setSaved(getSaved().filter(item => item.id !== id));
      renderSaved();
      showToast("삭제됨");
    }

    function loadSaved(id) {
      const item = getSaved().find(item => item.id === id);
      if (!item) return;

      const parsed = {};
      const chunks = item.text.split(/\n\n+/);
      chunks.forEach(chunk => {
        const match = chunk.match(/^\[(.+?)\]\n([\s\S]*)$/);
        if (!match) return;
        const label = match[1];
        const value = match[2];
        const field = fields.find(([name]) => name === label);
        if (field) parsed[field[1]] = value;
      });

      Object.assign(state, parsed);
      render();
      showToast("불러옴");
    }

    function renderSaved() {
      const list = getSaved();
      if (!list.length) {
        savedList.innerHTML = `<div class="saved-card"><div>저장된 페르소나 없음<small>마음에 드는 결과를 저장해둘 수 있음</small></div></div>`;
        return;
      }

      savedList.innerHTML = list.map(item => `
        <div class="saved-card">
          <div>
            <strong>${item.name || "이름 없음"}</strong>
            <small>${item.basic || ""}</small>
          </div>
          <div>
            <button onclick="loadSaved(${item.id})">불러오기</button>
            <button class="danger" onclick="deleteSaved(${item.id})">삭제</button>
          </div>
        </div>
      `).join("");
    }

    function initGenreSelect() {
      genreSelect.innerHTML = Object.keys(GENRES).map(genre => `<option value="${genre}">${genre}</option>`).join("");
    }
